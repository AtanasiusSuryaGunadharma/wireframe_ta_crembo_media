<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reset Password - Crembo Media</title>
  <style>
    :root {
      --brand: #1f1f1f;
      --ink: #111111;
      --line: #b8b8b8;
      --muted: #666666;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--ink);
      display: flex;
      flex-direction: column;
      background: #0b0b0b;
    }

    a { text-decoration: none; color: inherit; }

    .video-bg {
      position: fixed;
      inset: 0;
      z-index: -2;
    }

    .video-bg video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: grayscale(100%) contrast(108%);
    }

    .video-bg::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
    }

    .top {
      border-bottom: 2px solid #1f1f1f;
      background: rgba(255, 255, 255, 0.95);
    }

    .container {
      width: min(1120px, 94vw);
      margin: 0 auto;
    }

    .top-row {
      min-height: 62px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand img {
      width: 48px;
      height: 48px;
      object-fit: contain;
      border: 1px solid #bdbdbd;
      border-radius: 999px;
      background: #fff;
      padding: 4px;
      filter: grayscale(100%);
    }

    .brand strong { font-size: 0.95rem; }

    .back {
      border: 1px solid #b8b8b8;
      background: #fff;
      padding: 8px 11px;
      font-size: 0.88rem;
    }

    .back:hover { background: #efefef; }

    .main {
      flex: 1;
      display: grid;
      place-items: center;
      padding: 30px 0;
    }

    .stack {
      width: min(560px, 93vw);
      display: grid;
      gap: 12px;
    }

    .identity {
      border: 1px solid rgba(255,255,255,0.3);
      background: rgba(24, 24, 24, 0.62);
      border-radius: 14px;
      color: #fff;
      text-align: center;
      padding: 18px;
    }

    .identity img {
      width: 66px;
      height: 66px;
      object-fit: contain;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.4);
      background: #fff;
      padding: 5px;
      filter: grayscale(100%);
    }

    .identity h2 { margin: 8px 0 4px; }

    .card {
      border: 2px solid #1f1f1f;
      background: #fff;
      overflow: hidden;
    }

    .card-head {
      background: #1f1f1f;
      color: #fff;
      text-align: center;
      padding: 14px 14px 10px;
    }

    .card-head h3 { margin: 0; font-size: 1.6rem; }

    .card-head p {
      margin: 4px 0 0;
      font-size: 0.86rem;
      color: #d4d4d4;
    }

    .body { padding: 14px; }

    .ok {
      border: 1px solid #9bc4a0;
      background: #ebf7ed;
      color: #24522d;
      font-size: 0.84rem;
      padding: 9px 10px;
      margin-bottom: 10px;
    }

    .field {
      display: grid;
      gap: 6px;
      margin-bottom: 10px;
    }

    .field label {
      font-size: 0.86rem;
      color: #353535;
      font-weight: 600;
    }

    .field input {
      width: 100%;
      border: 1px solid #b8b8b8;
      background: #fff;
      padding: 10px 11px;
      font-size: 0.9rem;
      outline: none;
    }

    .field input:focus {
      border-color: #707070;
      box-shadow: 0 0 0 3px rgba(20,20,20,0.14);
    }

    .rules {
      border: 1px solid #cfcfcf;
      background: #f6f6f6;
      color: #4d4d4d;
      font-size: 0.8rem;
      padding: 8px 9px;
      margin: 0 0 12px;
    }

    .rules p {
      margin: 0 0 5px;
      font-weight: 600;
    }

    .rules ul {
      margin: 0;
      padding-left: 15px;
      display: grid;
      gap: 4px;
    }

    .btn {
      width: 100%;
      border: 1px solid #1f1f1f;
      background: #1f1f1f;
      color: #fff;
      padding: 10px;
      font-size: 0.92rem;
      cursor: pointer;
    }

    .btn:hover { background: #0f0f0f; }

    .small-link {
      margin-top: 10px;
      text-align: center;
      font-size: 0.86rem;
      color: #4f4f4f;
    }

    .small-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="video-bg" aria-hidden="true">
    <video autoplay muted loop playsinline preload="auto">
      <source src="bg_video_login.mp4" type="video/mp4">
    </video>
  </div>

  <header class="top">
    <div class="container top-row">
      <div class="brand">
        <img src="logo crembo hitam.png" alt="Logo Crembo">
        <strong>Crew Multimedia Baciro</strong>
      </div>
      <a class="back" href="login.html">&larr; Kembali ke Login</a>
    </div>
  </header>

  <main class="main">
    <div class="stack">
      <section class="identity">
        <img src="logo crembo hitam.png" alt="Logo sistem">
        <h2>CREMBO</h2>
        <p>Sistem Informasi Crew Multimedia Baciro</p>
      </section>

      <section class="card" aria-label="Reset password">
        <div class="card-head">
          <h3>Reset Password</h3>
          <p>Masukkan password baru Anda</p>
        </div>
        <div class="body">
          <div class="ok">Kode verifikasi valid. Silakan buat password baru.</div>
          <form id="resetForm">
            <div class="field">
              <label for="newPassword">Password Baru</label>
              <input id="newPassword" type="password" placeholder="Minimal 8 karakter" required>
            </div>
            <div class="field">
              <label for="confirmPassword">Konfirmasi Password</label>
              <input id="confirmPassword" type="password" placeholder="Ulangi password baru" required>
            </div>
            <div class="rules">
              <p>Syarat Password:</p>
              <ul>
                <li>Minimal 8 karakter</li>
                <li>Konfirmasi password harus sama</li>
              </ul>
            </div>
            <button class="btn" type="submit">Reset Password</button>
          </form>
          <div class="small-link"><a href="login.html">&larr; Kembali ke Login</a></div>
        </div>
      </section>
    </div>
  </main>

  <script>
    const contextRaw = localStorage.getItem("crembo-reset-context");
    if (!contextRaw) {
      window.location.href = "forgot-password.html";
    }

    const resetForm = document.getElementById("resetForm");
    const newPassword = document.getElementById("newPassword");
    const confirmPassword = document.getElementById("confirmPassword");

    resetForm.addEventListener("submit", function (event) {
      event.preventDefault();

      const pass1 = newPassword.value;
      const pass2 = confirmPassword.value;

      if (pass1.length < 8) {
        alert("Password minimal 8 karakter.");
        return;
      }

      if (pass1 !== pass2) {
        alert("Konfirmasi password belum sama.");
        return;
      }

      localStorage.removeItem("crembo-reset-context");
      window.location.href = "login.html?reset=success";
    });
  </script>
</body>
</html>
