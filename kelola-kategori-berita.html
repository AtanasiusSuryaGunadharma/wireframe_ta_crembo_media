<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kelola Kategori Berita - Crembo Media</title>
  <style>
    :root {
      --bg: #ececec;
      --panel: #ffffff;
      --line: #1f1f1f;
      --muted: #5b5b5b;
      --text: #111111;
      --side-text: #f4f4f4;
      --radius: 14px;
      --shadow: 0 10px 24px rgba(0, 0, 0, 0.16);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 20% 10%, #f8f8f8 0%, #ececec 38%, #e3e3e3 100%);
      min-height: 100vh;
    }

    .layout {
      display: grid;
      grid-template-columns: 300px 1fr;
      min-height: 100vh;
    }

    .sidebar {
      background: linear-gradient(180deg, #181818 0%, #0f0f0f 100%);
      color: var(--side-text);
      border-right: 2px solid var(--line);
      padding: 18px 14px;
      overflow-y: auto;
      position: sticky;
      top: 0;
      height: 100vh;
    }

    .brand {
      border: 1px solid #838383;
      background: rgba(255, 255, 255, 0.04);
      padding: 12px;
      border-radius: 12px;
      margin-bottom: 16px;
    }

    .brand h1 { margin: 0; font-size: 1rem; text-transform: uppercase; }
    .brand p { margin: 6px 0 0; color: #cdcdcd; font-size: 0.82rem; }

    .menu-group {
      border: 1px solid #656565;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.03);
      margin-bottom: 10px;
      overflow: hidden;
    }

    .group-toggle {
      width: 100%;
      text-align: left;
      border: 0;
      background: transparent;
      color: var(--side-text);
      font-weight: 700;
      font-size: 0.88rem;
      padding: 11px 12px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .group-items {
      display: block;
      border-top: 1px solid #525252;
      padding: 6px;
      background: rgba(255, 255, 255, 0.02);
    }

    .menu-link {
      display: block;
      text-decoration: none;
      color: #e5e5e5;
      border: 1px solid transparent;
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 0.83rem;
      margin-bottom: 4px;
    }

    .menu-link.active {
      border-color: #cfcfcf;
      background: #e9e9e9;
      color: #151515;
      font-weight: 700;
    }

    .side-actions {
      margin-top: 16px;
      display: grid;
      gap: 8px;
    }

    .side-actions a {
      text-decoration: none;
      border: 1px solid #8d8d8d;
      color: #ebebeb;
      text-align: center;
      padding: 9px 10px;
      border-radius: 10px;
      font-size: 0.82rem;
    }

    .main { padding: 16px; }

    .container {
      display: grid;
      gap: 12px;
    }

    .meta-header {
      border: 1px solid #cfcfcf;
      background: #f3f3f3;
      border-radius: 12px;
      padding: 10px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .meta-title {
      margin: 0;
      font-size: 1.35rem;
      font-weight: 700;
    }

    .meta-badges {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .chip {
      border: 1px solid #1f1f1f;
      background: #fafafa;
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 0.76rem;
      font-weight: 700;
    }

    .world-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 34px;
      height: 34px;
      border-radius: 999px;
      border: 1px solid #6b7280;
      background: #fff;
      color: #374151;
      text-decoration: none;
    }

    .world-link svg {
      width: 18px;
      height: 18px;
    }

    .headline {
      border: 1px solid #d1d5db;
      border-radius: 12px;
      background: #fff;
      padding: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .headline h1 {
      margin: 0;
      font-size: clamp(1.4rem, 2.6vw, 2rem);
    }

    .headline p {
      margin: 6px 0 0;
      color: #4b5563;
    }

    .grid {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 12px;
      align-items: start;
    }

    .panel {
      border: 1px solid #d1d5db;
      border-radius: var(--radius);
      background: #fff;
      box-shadow: var(--shadow);
      padding: 12px;
      display: grid;
      gap: 8px;
    }

    .panel h2 {
      margin: 0;
      font-size: 1.15rem;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    .label {
      font-size: 0.82rem;
      font-weight: 700;
      color: #374151;
    }

    input, textarea {
      width: 100%;
      border: 1px solid #cbd5e1;
      border-radius: 9px;
      padding: 9px 10px;
      font-size: 0.88rem;
      font-family: inherit;
      background: #fff;
    }

    textarea { min-height: 90px; resize: vertical; }

    .btn {
      border: 1px solid #1f2937;
      border-radius: 9px;
      background: linear-gradient(180deg, #4b5563 0%, #1f2937 100%);
      color: #fff;
      font-weight: 700;
      padding: 8px 11px;
      font-size: 0.82rem;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      justify-content: center;
      align-items: center;
    }

    .btn.primary {
      background: linear-gradient(180deg, #3b7df8 0%, #2f66d8 100%);
      border-color: #2f66d8;
    }

    .btn.ghost {
      background: #fff;
      color: #1f2937;
      border-color: #9ca3af;
      font-weight: 600;
    }

    .cards {
      display: grid;
      gap: 10px;
    }

    .card {
      border: 1px solid #d1d5db;
      border-radius: 12px;
      background: #fff;
      padding: 12px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
      display: grid;
      gap: 6px;
    }

    .card-head {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: flex-start;
    }

    .card h3 { margin: 0; font-size: 1.2rem; }

    .slug { color: #6b7280; font-size: 0.82rem; }
    .desc { color: #374151; font-size: 0.88rem; margin: 0; }

    .order {
      border: 1px solid #bfdbfe;
      background: #dbeafe;
      color: #1d4ed8;
      border-radius: 999px;
      padding: 3px 9px;
      font-size: 0.73rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .link-btn {
      border: 0;
      background: transparent;
      color: #2563eb;
      font-weight: 700;
      padding: 0;
      cursor: pointer;
      font-size: 0.82rem;
    }

    .link-btn.delete { color: #dc2626; }

    .notify {
      position: fixed;
      right: 18px;
      bottom: 18px;
      border: 1px solid #cfe0ff;
      background: #f1f6ff;
      color: #1e3a8a;
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 0.82rem;
      opacity: 0;
      pointer-events: none;
      transform: translateY(8px);
      transition: opacity 180ms ease, transform 180ms ease;
      z-index: 40;
    }

    .notify.show { opacity: 1; transform: translateY(0); }

    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar { display: none; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar" aria-label="Sidebar dashboard">
      <div class="brand">
        <h1>Crembo Media Panel</h1>
        <p>Kelola pengumuman, kategori, dan publikasi berita</p>
      </div>

      <div class="menu-group">
        <button class="group-toggle" type="button">Informasi & Publikasi <span>-</span></button>
        <div class="group-items">
          <a class="menu-link" href="manajemen-profil.html">Profil</a>
          <a class="menu-link active" href="kelola-berita.html">Pengumuman</a>
          <a class="menu-link" href="manajemen-agenda.html">Agenda Kegiatan</a>
          <a class="menu-link" href="manajemen-form-pendaftaran.html">Form Pendaftaran</a>
        </div>
      </div>

      <div class="side-actions">
        <a href="dashboard.html">Kembali ke Dashboard</a>
        <a href="home.html">Kembali ke Beranda</a>
      </div>
    </aside>

    <main class="main">
      <header class="meta-header" aria-label="Header dashboard waktu berjalan">
        <h1 class="meta-title">Dashboard</h1>
        <div class="meta-badges">
          <span id="liveDateTime" class="chip">-</span>
          <a class="world-link" href="home.html?session=active" title="Kembali ke Home (tetap login)">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.8"></circle>
              <path d="M3 12H21" stroke="currentColor" stroke-width="1.8"></path>
              <path d="M12 3C14.3 5.5 15.6 8.7 15.6 12C15.6 15.3 14.3 18.5 12 21" stroke="currentColor" stroke-width="1.8"></path>
              <path d="M12 3C9.7 5.5 8.4 8.7 8.4 12C8.4 15.3 9.7 18.5 12 21" stroke="currentColor" stroke-width="1.8"></path>
            </svg>
          </a>
        </div>
      </header>

      <section class="container">
        <header class="headline">
          <div>
            <h1>Kelola Kategori Berita</h1>
            <p>Tambah, edit, dan hapus kategori untuk artikel pengumuman.</p>
          </div>
          <a class="btn primary" href="kelola-berita.html">Kembali ke Berita</a>
        </header>

        <section class="grid">
          <article class="panel">
            <h2 id="formTitle">Tambah Kategori</h2>
            <form id="categoryForm" style="display:grid;gap:8px;">
          <div class="field">
            <label class="label" for="nameInput">Nama Kategori</label>
            <input id="nameInput" type="text" placeholder="Contoh: Umum, Akademik" required>
          </div>
          <div class="field">
            <label class="label" for="slugInput">Slug</label>
            <input id="slugInput" type="text" placeholder="Auto dari nama jika kosong">
          </div>
          <div class="field">
            <label class="label" for="descInput">Deskripsi</label>
            <textarea id="descInput" placeholder="Deskripsi singkat kategori"></textarea>
          </div>
          <div class="field">
            <label class="label" for="orderInput">Urutan</label>
            <input id="orderInput" type="number" min="0" step="1" value="0">
          </div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;">
            <button class="btn primary" type="submit">Simpan Kategori</button>
            <button id="cancelEditBtn" class="btn ghost" type="button">Batal</button>
          </div>
            </form>
          </article>

          <section id="categoryCards" class="cards" aria-label="Daftar kategori"></section>
        </section>
      </section>
    </main>
  </div>

  <div id="notify" class="notify" role="status" aria-live="polite"></div>

  <script>
    const CATEGORY_STORAGE_KEY = "crembo-announcement-categories";
    const ANNOUNCEMENT_STORAGE_KEY = "crembo-announcements";

    const formTitle = document.getElementById("formTitle");
    const categoryForm = document.getElementById("categoryForm");
    const nameInput = document.getElementById("nameInput");
    const slugInput = document.getElementById("slugInput");
    const descInput = document.getElementById("descInput");
    const orderInput = document.getElementById("orderInput");
    const cancelEditBtn = document.getElementById("cancelEditBtn");
    const categoryCards = document.getElementById("categoryCards");
    const liveDateTime = document.getElementById("liveDateTime");
    const notify = document.getElementById("notify");

    let categories = [];
    let editingId = "";

    function showNotify(message) {
      notify.textContent = message;
      notify.classList.add("show");
      window.clearTimeout(showNotify.timer);
      showNotify.timer = window.setTimeout(function () {
        notify.classList.remove("show");
      }, 2000);
    }

    function updateLiveDateTime() {
      const now = new Date();
      const dayNames = ["Minggu", "Senin", "Selasa", "Rabu", "Kamis", "Jumat", "Sabtu"];
      const monthNames = ["Jan", "Feb", "Mar", "Apr", "Mei", "Jun", "Jul", "Agu", "Sep", "Okt", "Nov", "Des"];
      const day = dayNames[now.getDay()];
      const date = String(now.getDate()).padStart(2, "0");
      const month = monthNames[now.getMonth()];
      const year = now.getFullYear();
      const hour = String(now.getHours()).padStart(2, "0");
      const minute = String(now.getMinutes()).padStart(2, "0");
      const second = String(now.getSeconds()).padStart(2, "0");
      liveDateTime.textContent = day + ", " + date + " " + month + " " + year + " " + hour + ":" + minute + ":" + second;
    }

    function safeParse(raw) {
      try {
        return JSON.parse(raw);
      } catch (error) {
        return null;
      }
    }

    function slugify(text) {
      return String(text || "")
        .toLowerCase()
        .trim()
        .replace(/[^a-z0-9\s-]/g, "")
        .replace(/\s+/g, "-")
        .replace(/-+/g, "-")
        .replace(/^-|-$/g, "");
    }

    function makeId(prefix) {
      return prefix + "-" + Date.now() + "-" + Math.random().toString(36).slice(2, 8);
    }

    function normalizeCategory(item, index) {
      if (typeof item === "string") {
        return {
          id: "cat-" + index,
          name: item,
          slug: slugify(item),
          description: "",
          order: index
        };
      }

      return {
        id: String(item && item.id ? item.id : makeId("cat")),
        name: String(item && (item.name || item.label) ? (item.name || item.label) : "Kategori"),
        slug: String(item && item.slug ? item.slug : slugify(item && (item.name || item.label) ? (item.name || item.label) : "kategori")),
        description: String(item && item.description ? item.description : ""),
        order: Number.isFinite(Number(item && item.order)) ? Number(item.order) : index
      };
    }

    function defaultCategories() {
      return [
        { id: "cat-umum", name: "Umum", slug: "umum", description: "Berita umum dan pengumuman penting", order: 0 },
        { id: "cat-akademik", name: "Akademik", slug: "akademik", description: "Berita terkait kegiatan akademik", order: 1 },
        { id: "cat-prestasi", name: "Prestasi", slug: "prestasi", description: "Pencapaian dan prestasi", order: 2 },
        { id: "cat-internasional", name: "Internasional", slug: "internasional", description: "Berita kerjasama internasional", order: 3 }
      ];
    }

    function loadCategories() {
      const raw = localStorage.getItem(CATEGORY_STORAGE_KEY);
      const parsed = raw ? safeParse(raw) : null;
      categories = Array.isArray(parsed) && parsed.length ? parsed.map(normalizeCategory) : defaultCategories();
      saveCategories();
    }

    function saveCategories() {
      localStorage.setItem(CATEGORY_STORAGE_KEY, JSON.stringify(categories));
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function renderCards() {
      if (!categories.length) {
        categoryCards.innerHTML = '<article class="card"><p class="desc">Belum ada kategori.</p></article>';
        return;
      }

      categoryCards.innerHTML = categories
        .slice()
        .sort(function (a, b) { return a.order - b.order; })
        .map(function (item) {
          return '<article class="card">'
            + '<div class="card-head"><div><h3>' + escapeHtml(item.name) + '</h3><div class="slug">' + escapeHtml(item.slug) + '</div></div><span class="order">Urutan: ' + String(item.order) + '</span></div>'
            + '<p class="desc">' + escapeHtml(item.description || "-") + '</p>'
            + '<div class="actions">'
            + '<button class="link-btn" type="button" data-action="edit" data-id="' + escapeHtml(item.id) + '">Edit</button>'
            + '<button class="link-btn delete" type="button" data-action="delete" data-id="' + escapeHtml(item.id) + '">Hapus</button>'
            + '</div>'
            + '</article>';
        }).join("");
    }

    function resetForm() {
      editingId = "";
      formTitle.textContent = "Tambah Kategori";
      categoryForm.reset();
      orderInput.value = "0";
    }

    function upsertCategory(event) {
      event.preventDefault();
      const payload = {
        id: editingId || makeId("cat"),
        name: nameInput.value.trim(),
        slug: (slugInput.value.trim() || slugify(nameInput.value.trim())),
        description: descInput.value.trim(),
        order: Number(orderInput.value)
      };

      if (!payload.name) {
        showNotify("Nama kategori wajib diisi.");
        return;
      }

      if (!payload.slug) {
        payload.slug = slugify(payload.name);
      }

      if (!Number.isFinite(payload.order) || payload.order < 0) {
        payload.order = 0;
      }

      const duplicate = categories.find(function (item) {
        return item.id !== payload.id && item.name.toLowerCase() === payload.name.toLowerCase();
      });
      if (duplicate) {
        showNotify("Nama kategori sudah ada.");
        return;
      }

      const existingIndex = categories.findIndex(function (item) { return item.id === payload.id; });
      let oldName = "";
      if (existingIndex >= 0) {
        oldName = categories[existingIndex].name;
        categories[existingIndex] = payload;
      } else {
        categories.push(payload);
      }

      saveCategories();
      syncCategoryRenameOnAnnouncements(oldName, payload.name);
      resetForm();
      renderCards();
      showNotify(existingIndex >= 0 ? "Kategori diperbarui." : "Kategori ditambahkan.");
    }

    function syncCategoryRenameOnAnnouncements(oldName, newName) {
      if (!oldName || oldName === newName) {
        return;
      }
      const raw = localStorage.getItem(ANNOUNCEMENT_STORAGE_KEY);
      const parsed = raw ? safeParse(raw) : null;
      if (!Array.isArray(parsed)) {
        return;
      }

      const updated = parsed.map(function (item) {
        const categoriesList = Array.isArray(item && item.categories)
          ? item.categories.slice()
          : [String(item && item.category ? item.category : "Umum")];
        const nextList = categoriesList.map(function (cat) {
          return String(cat) === oldName ? newName : String(cat);
        });
        item.categories = Array.from(new Set(nextList));
        item.category = item.categories[0] || "Umum";
        return item;
      });

      localStorage.setItem(ANNOUNCEMENT_STORAGE_KEY, JSON.stringify(updated));
    }

    function openEdit(id) {
      const target = categories.find(function (item) { return item.id === id; });
      if (!target) {
        return;
      }
      editingId = id;
      formTitle.textContent = "Edit Kategori";
      nameInput.value = target.name;
      slugInput.value = target.slug;
      descInput.value = target.description;
      orderInput.value = String(target.order);
      nameInput.focus();
    }

    function deleteCategory(id) {
      const target = categories.find(function (item) { return item.id === id; });
      if (!target) {
        return;
      }
      const ok = window.confirm('Hapus kategori "' + target.name + '"?');
      if (!ok) {
        return;
      }

      categories = categories.filter(function (item) { return item.id !== id; });
      if (!categories.length) {
        categories = defaultCategories();
      }
      saveCategories();
      syncCategoryDeleteOnAnnouncements(target.name);
      renderCards();
      resetForm();
      showNotify("Kategori dihapus.");
    }

    function syncCategoryDeleteOnAnnouncements(deletedName) {
      const raw = localStorage.getItem(ANNOUNCEMENT_STORAGE_KEY);
      const parsed = raw ? safeParse(raw) : null;
      if (!Array.isArray(parsed)) {
        return;
      }

      const fallbackName = categories[0] ? categories[0].name : "Umum";

      const updated = parsed.map(function (item) {
        const categoriesList = Array.isArray(item && item.categories)
          ? item.categories.map(String)
          : [String(item && item.category ? item.category : fallbackName)];

        const kept = categoriesList.filter(function (cat) { return cat !== deletedName; });
        item.categories = kept.length ? kept : [fallbackName];
        item.category = item.categories[0];
        return item;
      });

      localStorage.setItem(ANNOUNCEMENT_STORAGE_KEY, JSON.stringify(updated));
    }

    categoryForm.addEventListener("submit", upsertCategory);
    cancelEditBtn.addEventListener("click", resetForm);

    categoryCards.addEventListener("click", function (event) {
      const button = event.target.closest("button[data-action]");
      if (!button) {
        return;
      }
      const action = button.getAttribute("data-action");
      const id = button.getAttribute("data-id") || "";
      if (action === "edit") {
        openEdit(id);
      } else if (action === "delete") {
        deleteCategory(id);
      }
    });

    loadCategories();
    renderCards();
    resetForm();
    updateLiveDateTime();
    setInterval(updateLiveDateTime, 1000);
  </script>
</body>
</html>
